<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猫と秘密の避難所</title>
    <style>
        :root { --bg: #0f1115; --card: #1a1d23; --text: #d1d5db; --sub: #9ca3af; --accent: #3b82f6; --btn-bg: #2d333b; }
        [data-theme="light"] { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --sub: #64748b; --accent: #10b981; --btn-bg: #e2e8f0; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 15px; overflow-x: hidden; }

        /* 🐈 自由に動く猫エリア */
        #cat-field { position: relative; height: 160px; width: 100%; overflow: hidden; margin-bottom: 10px; cursor: pointer; }
        #walking-cat { position: absolute; bottom: 10px; left: 0; font-size: 50px; transition: left 2s linear, transform 0.2s; user-select: none; }

        .bubble { background: var(--card); padding: 12px; border-radius: 15px; font-size: 13px; margin-bottom: 20px; border: 1px solid var(--btn-bg); min-height: 50px; position: relative; }
        
        /* 入力エリア */
        .input-box { background: var(--card); padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 80px; background: var(--bg); border: 1px solid var(--btn-bg); border-radius: 10px; color: var(--text); padding: 10px; font-size: 15px; resize: none; overflow-y: auto; outline: none; }
        
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; background: var(--btn-bg); color: var(--text); font-size: 13px; }
        .btn-active { background: var(--accent); color: white; }

        /* 履歴 */
        .history { margin-top: 20px; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .hist-item { background: var(--card); padding: 10px; border-radius: 8px; margin-bottom: 6px; font-size: 12px; border-left: 4px solid var(--accent); }
        .hist-time { font-size: 10px; color: var(--sub); display: block; }

        /* 夜更かし警告 */
        #night-msg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; color: white; }

        .theme-toggle { position: absolute; top: 15px; right: 15px; font-size: 20px; cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body data-theme="dark">

    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>

    <div id="cat-field" onclick="catAction()">
        <div id="walking-cat">🐈</div>
    </div>

    <div class="bubble" id="cat-say">
        なんなの？なんかあったなら言いなよ。聞いてあげなくもないけど。
    </div>

    <div class="input-box">
        <textarea id="main-input" placeholder="ここになぐり書きして..."></textarea>
        <div class="btns">
            <button class="btn btn-active" onclick="talk('angry')">喝を入れて💢</button>
            <button class="btn btn-active" onclick="talk('praise')">褒めて✨</button>
            <button class="btn" onclick="talk('none')">ただの独り言</button>
            <button class="btn" onclick="clearInput()">全消去🗑️</button>
        </div>
    </div>

    <div class="history" id="hist-cont"></div>

    <div id="night-msg">
        <div style="font-size: 80px;">😾</div>
        <h2 id="night-h">寝ろって言ってんだろ</h2>
        <p id="night-p" style="margin: 15px 0; color: #9ca3af;"></p>
        <button class="btn btn-active" onclick="document.getElementById('night-msg').style.display='none'">すいません寝ます...</button>
    </div>

<script>
    const cats = ['🐈', '🐈‍⬛', '🐅', '🐱'];
    const catEl = document.getElementById('walking-cat');
    let theme = 'dark';

    // 猫のトコトコ移動
    function moveCat() {
        const x = Math.random() * (window.innerWidth - 60);
        catEl.style.left = x + 'px';
        catEl.style.transform = Math.random() > 0.5 ? 'scaleX(1)' : 'scaleX(-1)';
        catEl.innerText = cats[Math.floor(Math.random() * cats.length)];
    }
    setInterval(moveCat, 3000);

    function catAction() {
        const actions = ['🐾', '💤', '👅', '✨'];
        const original = catEl.innerText;
        catEl.innerText = actions[Math.floor(Math.random() * actions.length)];
        setTimeout(() => catEl.innerText = original, 1000);
    }

    const res = {
        angry: ["いつまで同じことでウジウジしてんの。時間の無駄。","あんたがそんなんだからナメられんのよ。","反省すんなら寝てからにしなさいよ。","はいはい、悲劇のヒロイン乙。で、明日は何すんの？"],
        praise: ["まあ、あんたなりによくやったんじゃない？","生きてるだけで100点とか、甘いこと言わないわよ。でも今日は120点。","あんたの努力、私だけは見てたから。お疲れ様。","たまには自分を甘やかしてもバチ当たらないわよ。"],
        none: ["ふーん。","聞いてるよ。","勝手に話しな。"]
    };

    function talk(type) {
        const input = document.getElementById('main-input');
        const say = document.getElementById('cat-say');
        if(!input.value && type !== 'none') return;

        // 履歴保存
        if(input.value) {
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const item = document.createElement('div');
            item.className = 'hist-item';
            item.innerHTML = `<span class="hist-time">${time}</span>${input.value}`;
            document.getElementById('hist-cont').prepend(item);
        }

        const msg = type === 'none' ? "あ、そう。" : res[type][Math.floor(Math.random() * res[type].length)];
        say.innerText = msg;
        input.value = "";
    }

    function clearInput() { document.getElementById('main-input').value = ""; }

    function toggleTheme() {
        theme = theme === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
    }

    function checkNight() {
        const hour = new Date().getHours();
        if (hour >= 22 || hour < 5) {
            document.getElementById('night-msg').style.display = 'flex';
            const diff = hour >= 22 ? hour - 22 : hour + 2;
            document.getElementById('night-p').innerText = hour + "時だよ。いつまで起きてんの。もう" + diff + "時間も夜更かししてる。";
        }
    }
    checkNight();
</script>
</body>
</html>
