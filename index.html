<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心のデトックス & 猫の説教</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1f;
            --surface: #222228;
            --accent: #ff7eb6;
            --text: #f0f0f8;
            --cat-color: #ffcc80;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Zen Kaku Gothic New', sans-serif; }
        body { background:var(--bg); color:var(--text); display:flex; flex-direction:column; min-height:100vh; padding:20px; overflow-x:hidden; }
        
        /* 猫の表示エリア */
        .cat-area { text-align:center; padding:20px; min-height:150px; }
        .cat-emoji { font-size:60px; display:block; margin-bottom:10px; transition: 0.3s; }
        .cat-bubble { background:var(--surface); padding:15px; border-radius:15px; border:2px solid var(--accent); position:relative; font-size:14px; line-height:1.6; }
        
        /* 入力エリア */
        .input-area { flex:1; display:flex; flex-direction:column; gap:10px; margin-top:20px; }
        textarea { width:100%; flex:1; background:var(--surface); border:1px solid #444; border-radius:15px; padding:15px; color:var(--text); font-size:16px; resize:none; outline:none; }
        textarea:focus { border-color:var(--accent); }

        /* ボタン */
        .btn-group { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px; }
        .btn { padding:15px; border-radius:12px; border:none; font-weight:900; cursor:pointer; font-size:14px; transition:0.2s; }
        .btn:active { transform:scale(0.95); }
        .btn-angry { background:#ff4757; color:white; } /* 説教 */
        .btn-praise { background:#2ed573; color:white; } /* 褒める */
        .btn-clear { background:#555; color:white; margin-top:10px; font-size:12px; }

        /* 22時以降の警告 */
        #night-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        #night-overlay .cat-emoji { font-size:100px; }
    </style>
</head>
<body>

    <div class="cat-area">
        <span id="cat-icon" class="cat-emoji">🐱</span>
        <div id="cat-msg" class="cat-bubble">
            ここはあなただけの場所だよ。誰にも言えないこと、全部吐き出しちゃいな。
        </div>
    </div>

    <div class="input-area">
        <textarea id="memo" placeholder="今のぐちゃぐちゃな気持ちを書いてね..."></textarea>
        
        <div class="btn-group">
            <button class="btn btn-angry" onclick="process('angry')">喝を入れて！💢</button>
            <button class="btn btn-praise" onclick="process('praise')">全力で褒めて！✨</button>
        </div>
        <button class="btn btn-clear" onclick="clearAll()">シュレッダー（全消去）</button>
    </div>

    <div id="night-overlay">
        <span class="cat-emoji">😾</span>
        <h2 id="night-title" style="color:#ff4757; margin-bottom:10px;"></h2>
        <p id="night-msg" style="margin-bottom:20px;"></p>
        <button class="btn btn-praise" onclick="closeNight()">わかった、すぐ寝る準備する</button>
    </div>

<script>
    const msgs = {
        angry: [
            "甘ったれんじゃないわよ！そんなことで立ち止まってていいの？",
            "あんたの人生でしょ！もっと自分を大事にしなさいよ！",
            "メソメソしてても何も変わらないわよ。とりあえず深呼吸しなさい！",
            "いつまで同じことで悩んでるの。一回全部忘れて寝なさい！",
            "そんな男（女・こと）のために時間使うの、もったいないと思わないわけ？！"
        ],
        praise: [
            "えっ、すごすぎる…！今日一日生きてただけで大天才だよ！✨",
            "見てたよ。あんたがどれだけ頑張ってたか、私だけは知ってるからね。",
            "頑張ったね。本当にえらい。今日はもう自分を甘やかしていいんだよ。",
            "あんたは最高だよ。世界で一番価値があるんだから、自信持って！",
            "そんなに頑張っちゃって…よしよし、撫でてあげる。大好きだよ！"
        ]
    };

    // 処理実行
    function process(type) {
        const text = document.getElementById('memo').value;
        const msgBox = document.getElementById('cat-msg');
        const catIcon = document.getElementById('cat-icon');

        if (!text) {
            msgBox.innerText = "まずは何か書かないと、何も言えないよ。";
            return;
        }

        // 演出：一旦文字を消す（宇宙に飛ばすイメージ）
        document.getElementById('memo').value = "";
        
        // ランダム返信
        const list = msgs[type];
        const result = list[Math.floor(Math.random() * list.length)];
        
        catIcon.style.transform = "scale(1.3) rotate(10deg)";
        setTimeout(() => catIcon.style.transform = "scale(1)", 200);

        msgBox.innerHTML = `<strong>【${type === 'angry' ? '説教モード' : '褒め褒めモード'}】</strong><br>${result}`;
        
        if (type === 'angry') catIcon.innerText = "😾";
        else catIcon.innerText = "😻";
    }

    function clearAll() {
        if(confirm("全部消してスッキリする？")) {
            document.getElementById('memo').value = "";
            document.getElementById('cat-msg').innerText = "全部消したよ。心も軽くなったかな？";
            document.getElementById('cat-icon').innerText = "🐱";
        }
    }

    // 夜更かしチェック
    function checkNight() {
        const now = new Date();
        const hour = now.getHours();
        const overlay = document.getElementById('night-overlay');

        // 22時〜翌朝5時の間
        if (hour >= 22 || hour < 5) {
            const diff = hour >= 22 ? hour - 22 : hour + 2; // 22時からの経過時間
            overlay.style.display = 'flex';
            
            document.getElementById('night-title').innerText = `現在 ${hour}時！`;
            
            let message = "";
            if (diff === 0) message = "まだ22時だけど、今のうちにスマホ置かないと明日辛いよ？";
            else if (diff === 1) message = "もう23時！猫はもう眠いんだけど。あんたも寝る準備しなさい！";
            else if (diff >= 2) message = `${diff}時間も夜更かししてるじゃない！いつまで起きてるの！美容にも悪いわよ！💢`;
            
            document.getElementById('night-msg').innerText = message;
        } else {
            overlay.style.display = 'none';
        }
    }

    function closeNight() {
        document.getElementById('night-overlay').style.display = 'none';
    }

    // 1分ごとに時間をチェック
    setInterval(checkNight, 60000);
    checkNight();
</script>
</body>
</html>
